
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #faf9f7;
            color: #333;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: #faf9f7;
            border-bottom: 1px solid #e8e6e3;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            color: #5c4b37;
            font-family: Georgia, serif;
        }

        .nav {
            display: flex;
            gap: 30px;
        }

        .nav a {
            text-decoration: none;
            color: #666;
            font-size: 14px;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: #5c4b37;
        }

        .cart-icon {
            font-size: 20px;
            cursor: pointer;
        }

        /* Breadcrumb */
        .breadcrumb {
            padding: 20px 50px;
            font-size: 13px;
            color: #888;
        }

        .breadcrumb a {
            color: #888;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: #5c4b37;
        }

        .breadcrumb span {
            margin: 0 8px;
        }

        /* Product Container */
        .product-container {
            display: flex;
            gap: 60px;
            padding: 0 50px 50px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Left Side - Image */
        .product-image {
            flex: 1;
            max-width: 550px;
        }

        .product-image img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            object-fit: cover;
        }

        /* Right Side - Details */
        .product-details {
            flex: 1;
            max-width: 450px;
        }

        .product-title {
            font-size: 32px;
            font-weight: 500;
            color: #3d3226;
            margin-bottom: 10px;
            font-family: Georgia, serif;
        }

        .product-price {
            font-size: 24px;
            color: #5c4b37;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .stars {
            color: #8b6f47;
            font-size: 16px;
        }

        .review-count {
            color: #888;
            font-size: 13px;
        }

        .product-description {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Size Selector */
        .size-section {
            margin-bottom: 25px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .size-options {
            display: flex;
            gap: 10px;
        }

        .size-btn {
            padding: 10px 20px;
            border: 1px solid #d4d0c8;
            background-color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.3s;
        }

        .size-btn:hover {
            border-color: #8b6f47;
        }

        .size-btn.active {
            background-color: #8b6f47;
            color: white;
            border-color: #8b6f47;
        }

        /* Quantity Selector */
        .quantity-section {
            margin-bottom: 25px;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            border: 1px solid #d4d0c8;
            border-radius: 8px;
            width: fit-content;
            background-color: white;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border: none;
            background-color: transparent;
            cursor: pointer;
            font-size: 18px;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            color: #5c4b37;
        }

        .qty-input {
            width: 50px;
            height: 40px;
            border: none;
            text-align: center;
            font-size: 15px;
            color: #333;
            outline: none;
        }

        /* Add to Cart Button */
        .add-to-cart {
            width: 100%;
            padding: 16px;
            background-color: #8b6f47;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 30px;
        }

        .add-to-cart:hover {
            background-color: #6d5638;
        }

        /* Features List */
        .features-list {
            list-style: none;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            color: #666;
            font-size: 14px;
        }

        .check-icon {
            color: #8b6f47;
            font-size: 16px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }

            .nav {
                display: none;
            }

            .breadcrumb {
                padding: 15px 20px;
            }

            .product-container {
                flex-direction: column;
                padding: 0 20px 30px;
                gap: 30px;
            }

            .product-image,
            .product-details {
                max-width: 100%;
            }

            .product-title {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">petitbloom</div>
        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
        <div class="cart-icon">🛒</div>
    </header>

    <!-- Breadcrumb -->
    <div class="breadcrumb">
        <a href="#">Home</a>
        <span>/</span>
        <a href="#">Shop</a>
        <span>/</span>
        <span>Cloud Sleep Sack</span>
    </div>

    <!-- Product Section -->
    <div class="product-container">
        <!-- Left Side - Product Image -->
        <div class="product-image">
            <img src="https://images.unsplash.com/photo-1519689680058-324335c77eba?w=600&h=700&fit=crop" alt="Baby in green inflatable pool">
        </div>

        <!-- Right Side - Product Details -->
        <div class="product-details">
            <h1 class="product-title">Cloud Sleep Sack</h1>
            <div class="product-price">$48</div>
            
            <div class="product-rating">
                <span class="stars">★★★★★</span>
                <span class="review-count">(1 reviews)</span>
            </div>

            <p class="product-description">
                Keep your little one cozy and safe through the night with our ultra-soft sleep sack.
            </p>

            <!-- Size Selector -->
            <div class="size-section">
                <label class="section-label">Size</label>
                <div class="size-options">
                    <button class="size-btn active">0-6M</button>
                    <button class="size-btn">6-12M</button>
                    <button class="size-btn">12-18M</button>
                </div>
            </div>

            <!-- Quantity Selector -->
            <div class="quantity-section">
                <label class="section-label">Quantity</label>
                <div class="quantity-selector">
                    <button class="qty-btn" onclick="decreaseQty()">−</button>
                    <input type="text" class="qty-input" value="1" id="quantity" readonly>
                    <button class="qty-btn" onclick="increaseQty()">+</button>
                </div>
            </div>

            <!-- Add to Cart Button -->
            <button class="add-to-cart">Add to Cart — $48.00</button>

            <!-- Features -->
            <ul class="features-list">
                <li class="feature-item">
                    <span class="check-icon">✓</span>
                    <span>TOG 1.0</span>
                </li>
                <li class="feature-item">
                    <span class="check-icon">✓</span>
                    <span>Hip-healthy design</span>
                </li>
                <li class="feature-item">
                    <span class="check-icon">✓</span>
                    <span>Two-way zipper</span>
                </li>
                <li class="feature-item">
                    <span class="check-icon">✓</span>
                    <span>Breathable fabric</span>
                </li>
            </ul>
        </div>
    </div>

    <script>
        function increaseQty() {
            let qty = document.getElementById('quantity');
            qty.value = parseInt(qty.value) + 1;
        }

        function decreaseQty() {
            let qty = document.getElementById('quantity');
            if (parseInt(qty.value) > 1) {
                qty.value = parseInt(qty.value) - 1;
            }
        }

        // Size button toggle
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
